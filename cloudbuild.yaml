# Phase 6 — CI/CD: build → Artifact Registry → migrate → Cloud Run (health-gated).
#
# Flow: build image → push → `prisma migrate deploy` → deploy a NEW revision with
# `--no-traffic` (tagged `candidate`) → probe its /health/ready → only then shift 100% of
# traffic to it. If the probe fails the build fails and the OLD revision keeps serving
# (automatic effective rollback).
#
# Secrets come from Secret Manager (see availableSecrets); non-secret config via --set-env-vars.
# Trigger: connect this repo in Cloud Build with substitutions for _REGION/_REPO/_SERVICE.

substitutions:
  _REGION: asia-northeast1
  _REPO: jobfit               # Artifact Registry repo
  _SERVICE: jobfit-backend    # Cloud Run service name

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: DATABASE_URL

steps:
  # 1) Build the image (tagged with the commit SHA + latest).
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest'
      - '.'

  # 2) Push (both tags).
  - id: push
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}']

  # 3) Apply pending Prisma migrations (never migrate dev). Runs from the source workspace
  #    (which has prisma/schema.prisma + migrations) in a clean root node image — the app
  #    image runs as non-root and has the prisma CLI pruned, so we don't use it here.
  - id: migrate
    name: node:22
    entrypoint: npx
    args: ['--yes', 'prisma@5.22.0', 'migrate', 'deploy']
    secretEnv: ['DATABASE_URL']

  # 4) Deploy a new revision WITHOUT traffic, addressable via the `candidate` tag.
  #    Secrets are wired from Secret Manager; non-secret config via env vars.
  # Cloud Run health-gates the rollout itself: a new revision only receives traffic after it
  # boots and its startup check passes; a failed revision leaves the previous one serving.
  # (For zero-downtime canaries later, switch to --no-traffic --tag=candidate + a health-gate
  #  step — that only works once the service already exists.)
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      # TRACE_ENABLED=false until the runtime SA has roles/cloudtrace.agent.
      - '--set-env-vars=NODE_ENV=production,LOG_FORMAT=json,LOG_LEVEL=info,METRICS_ENABLED=true,TRACE_ENABLED=false,SERVICE_NAME=${_SERVICE},SERVICE_VERSION=$BUILD_ID,GCP_PROJECT_ID=$PROJECT_ID'
      # SLACK_WEBHOOK_URL / REDIS_URL omitted until those secret values exist (optional/fail-open).
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,METRICS_TOKEN=METRICS_TOKEN:latest'
